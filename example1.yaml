id: "example-1"
name: "Example 1 Workflow"
doc_folder: "example1"
nodes:
  - id: "node-1"
    type: "TASK"
    swimlane_id: "strategist"
    label: "Draft Scope"
    system_prompt: "You are a strategist. Define the project scope."
    filename: "scope.md"
  - id: "node-2"
    type: "DECISION"
    swimlane_id: "architect"
    label: "Review Design"
    system_prompt: "You are a technical architect. Evaluate if the design is scalable."
  - id: "node-3"
    type: "TASK"
    swimlane_id: "writer"
    label: "Write Guide"
    system_prompt: "You are a lead writer. Create the final user guide."
    filename: "guide.md"
edges:
  - id: "edge-1"
    from_node_id: "node-1"
    to_node_id: "node-2"
    label: "Submit for Review"
  - id: "edge-2"
    from_node_id: "node-2"
    to_node_id: "node-3"
    label: "Approved"
  - id: "edge-3"
    from_node_id: "node-2"
    to_node_id: "node-1"
    label: "Reject / Redraft"
