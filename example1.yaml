id: "example-1"
name: "Project Alpha: System Design & Audit"
doc_folder: "example1"
nodes:
  - id: "node-1"
    type: "TASK"
    swimlane_id: "strategist"
    label: "Draft Project Scope"
    system_prompt: "You are a Chief Strategist. Define the project scope and success metrics."
    filename: "scope.md"
  - id: "node-2"
    type: "TASK"
    swimlane_id: "architect"
    label: "Design System Architecture"
    system_prompt: "You are a Technical Architect. Design the high-level architecture."
    filename: "design.md"
  - id: "node-3"
    type: "DECISION"
    swimlane_id: "architect"
    label: "Verify Scalability"
    system_prompt: "You are a Technical Architect. Evaluate if the design can handle 1M+ concurrent users."
  - id: "node-4"
    type: "TASK"
    swimlane_id: "security"
    label: "Conduct Security Audit"
    system_prompt: "You are a Security Auditor. Identify potential vulnerabilities in the architecture."
    filename: "security.md"
  - id: "node-5"
    type: "DECISION"
    swimlane_id: "security"
    label: "Risk Evaluation"
    system_prompt: "You are a Security Auditor. Categorize the findings as High, Medium, or Low risk."
  - id: "node-6"
    type: "TASK"
    swimlane_id: "writer"
    label: "Write Implementation Guide"
    system_prompt: "You are a lead technical writer. Create a guide mapping the design to implementation steps."
    filename: "guide.md"
edges:
  - id: "edge-1"
    from_node_id: "node-1"
    to_node_id: "node-2"
    label: "Proceed to Design"
  - id: "edge-2"
    from_node_id: "node-2"
    to_node_id: "node-3"
    label: "Review Scalability"
  - id: "edge-3"
    from_node_id: "node-3"
    to_node_id: "node-4"
    label: "Scalable - Proceed"
  - id: "edge-4"
    from_node_id: "node-3"
    to_node_id: "node-2"
    label: "Not Scalable - Redesign"
  - id: "edge-5"
    from_node_id: "node-4"
    to_node_id: "node-5"
    label: "Audit Complete"
  - id: "edge-6"
    from_node_id: "node-5"
    to_node_id: "node-6"
    label: "Low/Medium Risk - Approved"
  - id: "edge-7"
    from_node_id: "node-5"
    to_node_id: "node-2"
    label: "High Risk - Major Changes"
