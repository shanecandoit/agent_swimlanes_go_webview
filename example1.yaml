id: "feature-lifecycle-workflow"
name: "Product Feature Lifecycle: From PRD to Launch"
doc_folder: "example1"
nodes:
  - id: "prd-1"
    type: "TASK"
    swimlane_id: "strategist"
    label: "Draft Product Requirements (PRD)"
    system_prompt: "You are a Lead Product Strategist. Focus on 'Why' and 'Who'. Define the market need and success metrics."
    filename: "PRD.md"
  - id: "design-1"
    type: "TASK"
    swimlane_id: "architect"
    label: "Create Technical Design"
    system_prompt: "You are a Technical Architect. Focus on 'How'. Plan for scalability and tech stack alignment."
    filename: "DesignDoc.md"
  - id: "tech-vetting"
    type: "DECISION"
    swimlane_id: "architect"
    label: "Technical Feasibility?"
    system_prompt: "Assess if the PRD is implementable within the current tech stack and budget."
  - id: "audit-1"
    type: "TASK"
    swimlane_id: "security"
    label: "Perform Compliance Audit"
    system_prompt: "You are a Security Auditor. Focus on 'Risk'. Check for data privacy and OWASP alignment."
    filename: "SecurityReview.md"
  - id: "security-gate"
    type: "DECISION"
    swimlane_id: "security"
    label: "Pass Security Audit?"
    system_prompt: "Evaluate the design against security policies. Identify any high-risk blockers."
  - id: "writer-1"
    type: "TASK"
    swimlane_id: "writer"
    label: "Draft Release Notes"
    system_prompt: "You are a Technical Writer. Focus on 'User Value'. Translate the design into clear user-facing documentation."
    filename: "ReleaseNotes.md"
  - id: "final-approval"
    type: "DECISION"
    swimlane_id: "strategist"
    label: "Final Launch Approval"
    system_prompt: "As the lead strategist, perform a final review of the PRD, architecture, and documentation package."
edges:
  - id: "e1"
    from_node_id: "prd-1"
    to_node_id: "design-1"
    label: "Draft Design"
  - id: "e2"
    from_node_id: "design-1"
    to_node_id: "tech-vetting"
    label: "Review"
  - id: "e3"
    from_node_id: "tech-vetting"
    to_node_id: "prd-1"
    label: "Infeasible - Adjust Scope"
  - id: "e4"
    from_node_id: "tech-vetting"
    to_node_id: "audit-1"
    label: "Feasible - Audit Security"
  - id: "e5"
    from_node_id: "audit-1"
    to_node_id: "security-gate"
    label: "Evaluate Risks"
  - id: "e6"
    from_node_id: "security-gate"
    to_node_id: "design-1"
    label: "High Risk - Major Changes Required"
  - id: "e7"
    from_node_id: "security-gate"
    to_node_id: "writer-1"
    label: "Approved - Draft Docs"
  - id: "e8"
    from_node_id: "writer-1"
    to_node_id: "final-approval"
    label: "Stakeholder Review"
  - id: "e9"
    from_node_id: "final-approval"
    to_node_id: "writer-1"
    label: "Content Refresh Needed"
  - id: "e10"
    from_node_id: "final-approval"
    to_node_id: "prd-1"
    label: "Reject - Back to Strategy"
