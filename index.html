<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Swimlanes</title>
    <script src="http://localhost:8080/ui/js/leader-line.min.js"></script>
    <style>
        :root {
            --bg-deep: #0f1115;
            --bg-card: #181a1f;
            --border-color: #2d2f36;
            --accent-primary: #6366f1;
            --accent-subtle: #31333b;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            letter-spacing: -0.011em;
        }

        header {
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-deep);
            z-index: 10;
        }

        .logo {
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-main);
            border-left: 3px solid var(--accent-primary);
            padding-left: 0.75rem;
        }

        .status {
            font-size: 0.7rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
        }

        .swimlane-container {
            display: flex;
            flex: 1;
            padding: 0;
            overflow-x: auto;
            background: var(--bg-deep);
        }

        .lane {
            flex: 0 0 400px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            background: transparent;
        }

        .lane-header {
            padding: 1.5rem 1.5rem 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            border-bottom: 2px solid var(--accent-subtle);
            margin-bottom: 0.5rem;
        }

        .lane-title-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .lane-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-main);
        }

        /* Tooltip Container */
        .info-button {
            position: relative;
            cursor: help;
            color: var(--text-muted);
            line-height: 0;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .info-button:hover {
            color: var(--accent-primary);
        }

        /* Tooltip style */
        .info-button::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 2rem;
            top: 50%;
            transform: translateY(-50%);
            background: #1e293b;
            color: #f1f5f9;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 0.75rem;
            width: 250px;
            white-space: normal;
            line-height: 1.5;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            border: 1px solid var(--accent-subtle);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            font-weight: 400;
            text-transform: none;
            letter-spacing: normal;
        }

        .info-button:hover::after {
            opacity: 1;
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 17, 21, 0.9);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .leader-line {
            z-index: 1000 !important;
        }

        .modal-content {
            background: #1e293b;
            border: 1px solid var(--accent-subtle);
            border-radius: 16px;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            padding: 2.5rem;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.5rem;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: var(--text-main);
        }

        .modal-header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--accent-subtle);
            padding-bottom: 1rem;
        }

        .modal-body {
            line-height: 1.7;
            font-size: 1rem;
            color: #d1d5db;
        }

        .modal-body h1, .modal-body h2 {
            color: var(--text-main);
            margin-top: 1.5rem;
            margin-bottom: 1rem;
        }

        .lane-content {
            flex: 1;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 3rem;
            overflow-y: auto;
        }

        .task-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 1.25rem;
            border-radius: 4px;
            position: relative;
            transition: border-color 0.2s ease;
        }

        .task-card:hover {
            border-color: var(--text-muted);
        }

        .task-id {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
        }

        .task-text {
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-main);
            font-weight: 300;
        }

        .task-meta {
            margin-top: 1.25rem;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 0.5rem;
        }

        .tag {
            padding: 0.1rem 0.4rem;
            border-radius: 2px;
            background: var(--accent-subtle);
            font-size: 0.6rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Scrollbar styles to keep it austere */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 2px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        footer {
            padding: 0.75rem 2rem;
            border-top: 0.5px solid var(--border-color);
            background: var(--bg-deep);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .glint {
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.03), transparent);
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            transform: skewX(-20deg);
            transition: 0.7s;
        }

        .task-card:hover .glint {
            left: 100%;
        }

    </style>
</head>
<body>
    <header>
        <div class="logo">Agent Swimlanes</div>
        <div class="status">
            <span class="status-dot"></span>
            Orchestrator Heartbeat: 200ms
        </div>
    </header>

    <div class="swimlane-container" id="swimlane-container">
        <!-- Dynamic content will be loaded here -->
    </div>

    <footer>
        <div id="build-tag">BUILD VERSION 0.1.0-ALPHA</div>
        <div id="api-status">CONNECTING TO WORKFLOW ENGINE...</div>
    </footer>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div id="modal-header" class="modal-header"></div>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <script src="http://localhost:8080/ui/js/marked.min.js"></script>
    <script src="http://localhost:8080/ui/js/leader-line.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:8080';
        let activeLines = [];
        let currentWorkflow = null;

        async function openModal(nodeId) {
            const node = currentWorkflow.nodes.find(n => n.id === nodeId);
            if (!node) return;

            const modalOverlay = document.getElementById('modal-overlay');
            const header = document.getElementById('modal-header');
            const body = document.getElementById('modal-body');

            header.innerHTML = `
                <h1 style="margin: 0; font-size: 1.5rem; color: #f1f5f9;">${node.label}</h1>
                <div style="margin-top: 0.5rem; color: var(--text-muted); font-size: 0.8rem;">
                    NODE ID: ${node.id} | AGENT: ${node.swimlane_id.toUpperCase()}
                </div>
            `;
            
            body.innerHTML = 'Loading document content...';
            modalOverlay.classList.add('active');

            if (node.filename) {
                try {
                    const response = await fetch(`${API_BASE}/api/docs/${node.filename}`);
                    if (response.ok) {
                        const markdown = await response.text();
                        // Use marked to parse markdown
                        body.innerHTML = marked.parse(markdown);
                    } else {
                        body.innerHTML = '<p style="color: #ef4444;">Document not found on disk.</p>';
                    }
                } catch (err) {
                    body.innerHTML = `<p style="color: #ef4444;">Error loading document: ${err.message}</p>`;
                }
            } else {
                body.innerHTML = '<p style="color: var(--text-muted); font-style: italic;">No document file associated with this node.</p>';
            }
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
        }

        // Close on escape key
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Fetch workflow state and render UI
        async function loadWorkflow() {
            try {
                const response = await fetch(`${API_BASE}/api/workflow/graph`);
                if (!response.ok) throw new Error('Failed to fetch workflow');
                currentWorkflow = await response.json();
                
                document.getElementById('api-status').innerText = `CONNECTED: ${currentWorkflow.name}`;
                renderWorkflow(currentWorkflow);
                
                // Wait for layout to settle, then draw edges
                setTimeout(() => drawEdges(currentWorkflow), 300);
            } catch (err) {
                console.error(err);
                document.getElementById('api-status').innerText = 'OFFLINE (Is the server running on :8080?)';
            }
        }

        const infoIconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>`;

        function renderWorkflow(workflow) {
            const container = document.getElementById('swimlane-container');
            container.innerHTML = ''; // Clear previous

            // Detect Start and End nodes
            const startNodeIds = new Set(workflow.nodes.map(n => n.id));
            const endNodeIds = new Set(workflow.nodes.map(n => n.id));
            workflow.edges.forEach(e => {
                startNodeIds.delete(e.to_node_id);
                endNodeIds.delete(e.from_node_id);
            });

            // Unique swimlane IDs from nodes
            const laneIds = [...new Set(workflow.nodes.map(n => n.swimlane_id))];
            
            laneIds.forEach(laneId => {
                const laneNodes = workflow.nodes.filter(n => n.swimlane_id === laneId);
                const personaInfo = laneNodes[0]?.system_prompt || "No persona defined.";

                const laneEl = document.createElement('div');
                laneEl.className = 'lane';
                
                laneEl.innerHTML = `
                    <div class="lane-header">
                        <div class="lane-title-group">
                            <div class="lane-title">${laneId.toUpperCase()}</div>
                            <div class="info-button" data-tooltip="${personaInfo}">
                                ${infoIconSvg}
                            </div>
                        </div>
                    </div>
                    <div class="lane-content" id="lane-${laneId}"></div>
                `;
                
                container.appendChild(laneEl);
                const contentEl = laneEl.querySelector('.lane-content');

                laneNodes.forEach(node => {
                    const card = createNodeCard(node, {
                        isStart: startNodeIds.has(node.id),
                        isEnd: endNodeIds.has(node.id)
                    });
                    contentEl.appendChild(card);
                });
            });
        }

        function createNodeCard(node, meta) {
            const card = document.createElement('div');
            card.className = 'task-card';
            card.id = `node-el-${node.id}`;
            
            const isDecision = node.type === 'DECISION';
            
            card.innerHTML = `
                <div class="glint"></div>
                <div class="task-id">
                    ${node.id}
                    ${meta.isStart ? '<span class="tag" style="background: #059669; color: white;">START</span>' : ''}
                    ${meta.isEnd ? '<span class="tag" style="background: #991b1b; color: white;">END</span>' : ''}
                </div>
                <div class="task-text" id="content-${node.id}">
                    <strong>${node.label}</strong>
                    <div style="font-size: 0.75rem; margin-top: 0.5rem; color: var(--text-muted);">
                        ${isDecision ? '<em>Decision Engine</em>' : 'Loading content...'}
                    </div>
                </div>
                <div class="task-meta">
                    <span class="tag" style="background: ${isDecision ? '#9333ea' : 'var(--accent-subtle)'}">${node.type}</span>
                </div>
            `;

            if (node.filename) {
                fetchDocContent(node.filename, `content-${node.id}`);
            }

            // Add hover handlers to highlight lines
            card.addEventListener('mouseenter', () => highlightLines(node.id, true));
            card.addEventListener('mouseleave', () => highlightLines(node.id, false));

            // Double-click to open modal
            card.addEventListener('dblclick', () => openModal(node.id));

            return card;
        }

        const lineMap = new Map(); // nodeID -> lines[]

        function drawEdges(workflow) {
            activeLines.forEach(line => { try { line.remove(); } catch (e) {} });
            activeLines = [];
            lineMap.clear();

            if (typeof LeaderLine === 'undefined') return;

            workflow.edges.forEach(edge => {
                const startEl = document.getElementById(`node-el-${edge.from_node_id}`);
                const endEl = document.getElementById(`node-el-${edge.to_node_id}`);

                if (startEl && endEl) {
                    try {
                        const line = new LeaderLine(
                            startEl,
                            endEl,
                            {
                                color: 'rgba(99, 102, 241, 0.15)', // Faint by default
                                size: 2,
                                path: 'fluid',
                                endPlug: 'arrow',
                                dash: { animation: true },
                                label: edge.label ? LeaderLine.captionLabel(edge.label, {color: 'rgba(241, 245, 249, 0.3)', fontSize: 10}) : ''
                            }
                        );
                        activeLines.push(line);
                        
                        // Map lines to both start and end nodes
                        if (!lineMap.has(edge.from_node_id)) lineMap.set(edge.from_node_id, []);
                        if (!lineMap.has(edge.to_node_id)) lineMap.set(edge.to_node_id, []);
                        lineMap.get(edge.from_node_id).push(line);
                        lineMap.get(edge.to_node_id).push(line);
                    } catch (e) {
                        console.error('Error drawing line:', e);
                    }
                }
            });
        }

        function highlightLines(nodeId, highlight) {
            const lines = lineMap.get(nodeId);
            if (!lines) return;

            lines.forEach(line => {
                line.setOptions({
                    color: highlight ? 'rgba(99, 102, 241, 0.9)' : 'rgba(99, 102, 241, 0.15)',
                    size: highlight ? 4 : 2,
                });
                // We could also update the label here if needed
                if (line.label) {
                    // LeaderLine is funny about label updates, sometimes it needs redraw
                }
            });
        }

        async function fetchDocContent(filename, targetId) {
            try {
                const response = await fetch(`${API_BASE}/api/docs/${filename}`);
                if (!response.ok) throw new Error('Doc not found');
                const content = await response.text();
                
                const targetEl = document.getElementById(targetId);
                if (targetEl) {
                    const preview = content.substring(0, 100).replace(/#/g, '').trim() + (content.length > 100 ? '...' : '');
                    const label = targetEl.querySelector('strong').innerText;
                    targetEl.innerHTML = `<strong>${label}</strong><div style="margin-top: 0.5rem; font-style: normal; font-size: 0.8rem; color: #cbd5e1; line-height: 1.5;">${preview}</div>`;
                }
            } catch (err) {
                console.error(err);
            }
        }

        // Handle drawing and repositioning
        window.addEventListener('load', loadWorkflow);
        
        // Reposition lines when container scrolls or window resizes
        const container = document.getElementById('swimlane-container');
        if (container) {
            container.addEventListener('scroll', () => {
                activeLines.forEach(l => l.position());
            });
        }
        
        window.addEventListener('resize', () => {
            activeLines.forEach(l => l.position());
        });

        // Periodic refresh (optional, but keep it low for stability)
        // setInterval(loadWorkflow, 30000);
    </script>
</body>
</html>
